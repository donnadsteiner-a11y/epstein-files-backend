name: Dataset 1 — PDF Downloader

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  download:
    name: Download & Upload DS1 PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests boto3 beautifulsoup4 botocore

      - name: Run DS1 downloader
        env:
          DOJ_COOKIES:    ${{ secrets.DOJ_COOKIES }}
          DO_ENDPOINT:    ${{ secrets.DO_ENDPOINT }}
          DO_ACCESS_KEY:  ${{ secrets.DO_ACCESS_KEY }}
          DO_SECRET_KEY:  ${{ secrets.DO_SECRET_KEY }}
          DO_BUCKET:      ${{ secrets.DO_BUCKET }}
        run: |
          python ds1_downloader.py

      - name: Upload failed URLs artifact (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-urls-ds1
          path: failed_urls.txt
          if-no-files-found: ignore
