name: DOJ Daily Crawler

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y tesseract-ocr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily monitor
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_ENDPOINT: ${{ secrets.DREAMHOST_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.DREAMHOST_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.DREAMHOST_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.DREAMHOST_BUCKET }}
        run: python crawler/daily_monitor.py
