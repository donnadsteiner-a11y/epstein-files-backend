name: Kino Bulk — Large Datasets (DS9, DS10, DS11)

on:
  schedule:
    - cron: "30 */4 * * *"   # offset from main downloader by 30 min
  workflow_dispatch:

jobs:

  # ── Dataset 9: EFTA 00039025 → 01262781 (531,284 files) ──────────────────
  ds9:
    name: "DS9 slice ${{ matrix.slice }}"
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        include:
          - slice: "01"  start: "39025"    end: "92000"
          - slice: "02"  start: "92001"    end: "145000"
          - slice: "03"  start: "145001"   end: "198000"
          - slice: "04"  start: "198001"   end: "251000"
          - slice: "05"  start: "251001"   end: "304000"
          - slice: "06"  start: "304001"   end: "357000"
          - slice: "07"  start: "357001"   end: "410000"
          - slice: "08"  start: "410001"   end: "463000"
          - slice: "09"  start: "463001"   end: "516000"
          - slice: "10"  start: "516001"   end: "570000"
          - slice: "11"  start: "570001"   end: "623000"
          - slice: "12"  start: "623001"   end: "676000"
          - slice: "13"  start: "676001"   end: "729000"
          - slice: "14"  start: "729001"   end: "782000"
          - slice: "15"  start: "782001"   end: "835000"
          - slice: "16"  start: "835001"   end: "888000"
          - slice: "17"  start: "888001"   end: "941000"
          - slice: "18"  start: "941001"   end: "994000"
          - slice: "19"  start: "994001"   end: "1047000"
          - slice: "20"  start: "1047001"  end: "1262781"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests boto3 botocore
      - name: Download DS9 slice ${{ matrix.slice }}
        env:
          DATASET_NUMBER: "9"
          SLICE_START:    ${{ matrix.start }}
          SLICE_END:      ${{ matrix.end }}
          DO_ENDPOINT:    ${{ secrets.DO_ENDPOINT }}
          DO_ACCESS_KEY:  ${{ secrets.DO_ACCESS_KEY }}
          DO_SECRET_KEY:  ${{ secrets.DO_SECRET_KEY }}
          DO_BUCKET:      ${{ secrets.DO_BUCKET }}
        run: python kino_bulk_downloader.py

  # ── Dataset 10: EFTA 01262782 → 02205654 (942,873 files) ─────────────────
