name: Dataset 12 — Verify

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify DS12 completeness
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests boto3 beautifulsoup4 botocore

      - name: Run DS12 verification
        env:
          DOJ_COOKIES:    ${{ secrets.DOJ_COOKIES }}
          DO_ENDPOINT:    ${{ secrets.DO_ENDPOINT }}
          DO_ACCESS_KEY:  ${{ secrets.DO_ACCESS_KEY }}
          DO_SECRET_KEY:  ${{ secrets.DO_SECRET_KEY }}
          DO_BUCKET:      ${{ secrets.DO_BUCKET }}
        run: |
          python ds12_verify.py
